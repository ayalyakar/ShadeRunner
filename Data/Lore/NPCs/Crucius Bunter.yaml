# Canonical NPC — landlord / manager of the Royal Meadows Apartments in Redmond Barrens.

name: "Crucius Bunter"
era: 2050
authored: false
status: "active adventure NPC (Queen Euphoria)"
kind: "Landlord / building manager (corporate-tenement)"

sources:
  - edition: SR1E
    book: "Queen Euphoria"
    year: 1990
    page: 11
    image: "Sources/SR1E-QueenEuphoria/p011-royal-what.png"
    section: "Royal What? / Behind the Scenes (introduction)"
  - edition: SR1E
    book: "Queen Euphoria"
    year: 1990
    page: 12
    image: "Sources/SR1E-QueenEuphoria/p012-royal-meadows-map.png"
