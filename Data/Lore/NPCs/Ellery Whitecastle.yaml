# Canonical NPC — local Fixer hired by Ludivenko Corporation; PC-facing voice for the Queen Euphoria opening brief.

name: "Ellery Whitecastle"
alt_names:
  - name: "Elliot Whitecastle"
    status: "rejected; low-res misread from p.6 Plot Synopsis ingestion"
    transcription_note: "The p.6 synopsis was ingested from a low-res phone screenshot and mis-transcribed the given name as 'Elliot.' Canonical spelling on the clearer p.8 Wake Up Call page is 'Ellery.' The p.6 npc_refs entry in Data/Lore/Adventures/QueenEuphoria.yaml still carries the old spelling with a reconciliation note."
era: 2050
authored: false
