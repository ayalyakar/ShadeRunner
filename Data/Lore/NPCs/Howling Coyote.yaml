# Canonical NPC — historical figure / spiritual leader.

name: "Howling Coyote"
title: "Spiritual leader of the Native American resistance (2010s); architect of the Great Ghost Dance (2017-08-04)"
status: "historical / canonically mythological-scale figure; 2050-era status TBD from later SR canon"

