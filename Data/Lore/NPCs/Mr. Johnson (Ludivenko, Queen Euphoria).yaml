    pattern: |
      Uses Whitecastle as a cut-out: Whitecastle places the opening call,
      the PCs never learn Mr. Johnson's true employer from Whitecastle,
      and Mr. Johnson is the only Ludivenko face the runners will see in
      the Wake Up Call scene.
  venue_first_meet:
    place_ref: "Data/Lore/Places/Docks/Pier 36 (Tacoma).yaml"
    time: "11pm"

