# Canonical faction — emergency medical / extraction corporation.

name: "DocWagon"
type: "Corporation (emergency medical response)"
tier: "AA-equivalent (best-in-class in its segment; precise tier TBD)"

sources:
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 12
    image: "Sources/SR1E-Seattle/p012-facts-ssc-legal-medical-alcohol-entertainment.png"
    section: "Facts at Your Fingertips — Medical Assistance"

presence:
  - metroplex: "Seattle"
    coverage: "Citywide, including high-risk zones where public ambulances won't go."
    activity_level: "Ambient at MVP (flavor + Trid ads); direct engagement post-MVP."

structure:
  services:
    - type: "Emergency medical extraction"
      description: |
        Customer-subscribed; dispatched on a panic-button call. Armored
        vehicles and helicopters; armed response team accompanies
        paramedic crew.
    - type: "Trauma stabilization"
    - type: "Transport to contracted or requested hospital"
  assets:
    - "Armored response cars"
    - "Helicopters"

business_model:
  subscription:
    tiers:
      - name: "Basic"
        monthly_yen_placeholder: 100
        response_time_guarantee_minutes: 20
        coverage_note: "Urban metroplex core only; no Barrens or SSC coverage."
        extraction_team_size: "Small paramedic team; light armed escort."
        transcription_note: "Tier numbers are project placeholders pending later-edition canon confirmation."
      - name: "Gold"
        monthly_yen_placeholder: 500
        response_time_guarantee_minutes: 10
        coverage_note: "Urban metroplex + Barrens (limited); still no open SSC ops."
        extraction_team_size: "Full paramedic team + armored transport + rapid-response security."
      - name: "Platinum"
        monthly_yen_placeholder: 2000
        response_time_guarantee_minutes: 5
        coverage_note: "Metroplex-wide including Barrens; cross-border SSC ops case-by-case."
        extraction_team_size: "Elite extraction: paramedic team, armored helicopter, full security team, trauma stabilization gear."
        flavor: "Corp-exec + AAA-runner tier; the chopper is overhead within 5 minutes of a panic-button press."
    tier_placeholder_note: |
      SR canon across editions establishes Basic / Gold / Platinum
      with escalating response-time guarantees. Pricing + response
      minutes above are project placeholders (forward-compatible with
      economy simulation; Character/DESIGN - Lifestyle.md / World/
      DESIGN - Economy.md). Exact canonical numbers TBD; adjust when
      a sourcebook confirms.
  call_pattern: "Customer-triggered (subscribed credstick carries the panic-button authorization)."
  non_subscriber_policy: |
    Non-subscribers can be billed on-site at emergency rates — but
    DocWagon is not obligated to respond. The armored team's priority
    is always the paying customer.
  district_availability_note: |
    Per canonical Barrens-register framing, Basic-tier subscribers in
    Redmond / Puyallup / other A-rated districts may get no
    guaranteed coverage — vehicle response doesn't enter those zones
    routinely. Tier-by-district availability matrix TBD.

reputation:
  seattle_register: "Well-respected."
  cultural_anchor: |
    DocWagon's armored response convoys are a canonical Seattle
    atmosphere element — sirens + black-and-red paint jobs blowing
    through intersections are a Trid staple.

relationships:
  allies:
    - faction: "Corporate clientele (AAA, AA employers with group plans)"
      note: "Corporate DocWagon contracts common; embedded in many mid-to-high lifestyle tiers."
  rivals:
    - "Other megacorp medical services (details post-MVP)"
  hostile:
    - "Organ-legger rings — DocWagon arrival complicates a harvest."
      note_transcription: "Implied framing, not explicit on p.12."
  neutral:
    - "City Hospitals Health System"
    - "Lone Star"

game_presence:
  mvp: "ambient (Trid ads, NPC barks, witnessing an armored response during a run for atmosphere)."
  post_mvp:
    - "Subscription as a lifestyle line-item (monthly cost → on-call extraction)."
    - "Run: intercept / impersonate a DocWagon crew to extract a target."
    - "Run: protect a DocWagon crew under fire from a gang attack."
    - "Run: steal a DocWagon response vehicle for a get-away."
    - "Contact: a DocWagon paramedic (Connection 2-3, medical-intel service, street doc adjacent)."

hooks:
  - "Armored-response-at-the-scene interrupt — classic SR encounter."
  - "DocWagon subscription as status-signifier at higher lifestyle tiers."
  - "Organ-legger subplot — DocWagon as obstacle or ally depending on the run."

standing_default: 0
thresholds:
  hostile: -60
  unfriendly: -20
  neutral: 0
  friendly: 20
  trusted: 60

transcription_note: |
  This stub is built from the single paragraph on SR1E Seattle Sourcebook
  p.12. Full-fidelity DocWagon canon (subscription tiers, pricing,
  response-time guarantees, rival HMOs) requires further sourcebook
  ingestion. Flag for expansion when relevant pages arrive.
