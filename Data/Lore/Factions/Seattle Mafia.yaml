# Canonical faction — Seattle chapter of the North American Mafia.

name: "Seattle Mafia"
type: "Organized crime"
tier: "AA-equivalent"

sources:
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 21
    image: "Sources/SR1E-Seattle/p021-downtown-geography-demographics.png"
    section: "Downtown — Crime (HQ / Harbor Island turf)"

overview: |
  One of two dominant organized-crime syndicates in the Seattle
  Metroplex alongside the Yakuza Rings. HQ'd in Downtown Seattle with
  canonical extortion-control of the Harbor Island industrial / freight
  zone. Roughly a third of the Mafia's Seattle yearly take comes from
  Downtown operations (per SR1E Seattle Sourcebook p.21).

presence:
  - metroplex: "Seattle"
    hq_district: "Downtown"
    revenue_share_from_downtown_approx: 0.33
    activity_level: "ambient at MVP (Redmond is MVP district; Mafia appears in dialogue / rep)."

turf:
  authoritative: true
  note: "Per project canon policy, syndicate-turf is authoritative on the faction side; neighborhoods cross-reference."
  zones:
    - district: "Downtown"
      neighborhood: "Harbor Island"
      control_mode: "Ownership + extortion — 'nearly every business pays or is owned'."
      source_page: 21
    - district: "Redmond"
      neighborhood: null
      control_mode: "Black markets + recruitment pool (carried forward from prior Redmond-era canon; flag for re-verification when Redmond chapter ingests)."
      source_page: null
