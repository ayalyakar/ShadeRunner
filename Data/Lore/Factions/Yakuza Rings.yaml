type: "Organized crime"

sources:
  - edition: SR1E
    page: 128
    title: "Redmond: New Hope for a Troubled District"
    section: "Outlying"

structure:
  rings_in_redmond: 5
  most_active: "Ill Squires"
  ill_squires:
    leader: "Don Autigerano"
    npc_ref: "Data/Lore/NPCs/Autigerano.yaml"

recruitment_pipeline:
  description: |
    Yakuza Rings use Redmond as a recruitment pool. Identify
    promising warriors or magicians; name them as probationary
    recruits. If they pass, warriors receive performance-enhancing
    cyberware; magicians gain access to the Ring's library and
    magical cache.
  hooks:
    - "Cyberware bounty: Yakuza offers free chrome to promising warrior recruits."
    - "Magical tutelage: magician recruits get lodge access in exchange for service."
    - "Defection runs: extract a recruit before indoctrination hardens."

game_presence:
  mvp: "ambient (recruitment offers, background events)"
  post_mvp: "direct engagement; runs into Yakuza strongholds"
