# Canonical faction — Seattle Yakuza (multi-ring umbrella).

name: "Yakuza Rings (Seattle)"
type: "Organized crime"
tier: "AA-equivalent"

sources:
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 21
    image: "Sources/SR1E-Seattle/p021-downtown-geography-demographics.png"
    section: "Downtown — Crime (HQ / International District turf)"

overview: |
  One of two dominant organized-crime syndicates in the Seattle
  Metroplex alongside the Seattle Mafia. HQ'd in Downtown Seattle
  with canonical extortion-control of the International District.
  Roughly a third of the Yakuza's Seattle yearly take comes from
  Downtown operations (per SR1E Seattle Sourcebook p.21).
  Structured internally as multiple 'Rings' (SR canon — separate
  organizations operating under the Yakuza umbrella with their own
  leadership, turf, and rivalries).

presence:
  - metroplex: "Seattle"
    hq_district: "Downtown"
    revenue_share_from_downtown_approx: 0.33
    activity_level: "ambient at MVP (Redmond is MVP district; Yakuza appears in dialogue / rep / rumor)."

turf:
