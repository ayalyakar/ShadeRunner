# Canonical faction — historical military confederation (precursor to SSC).

name: "Salish-Shidhe War Council"
type: "Historical / military confederation (defunct)"
tier: "Nation-state-scale (during 2010s)"
status: "Historical only — evolved into the Salish-Shidhe Council after the Treaty of Denver (April 2018)."

