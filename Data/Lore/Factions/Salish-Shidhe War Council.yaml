overview: |
  Military-era confederation that fought the Awakening War
  (2011-2017) against the US federal government. Composed of
  Native American tribes, Elves, and magicians under unified
  command. Transitioned to the civilian Salish-Shidhe Council
  after the April-2018 Treaty of Denver.

composition:
  member_tribes_listed_on_page_14:
    - "Salish"
    - "Makah"
    - "Norteño"
    - "Cree"
    - "Salish-Shakal"
  member_tribes_transcription_note: |
    Tribe list partly illegible on p.14 scan; 'Salish-Shakal' low
    confidence. See Sources/VERIFICATION.md.
  non_tribal_members:
    - "Elven communities"
    - "Magicians (formal representation in command)"

leadership:
  spiritual:
    name: "Howling Coyote"
    file: "Data/Lore/NPCs/Howling Coyote.yaml"
  military_field_command:
    name: "Thunder Tyer"
    file: "Data/Lore/NPCs/Thunder Tyer.yaml"

canonical_operations:
  - year: 2011
    event: "VITAS + Olympic-Peninsula-earthquake mobilization; guerrilla war begins."
  - year: 2015
    event: "Trident Submarine Base (Bangor) captured under Tyer's command."
  - year: 2015
    event: "Kugri / Puget Sound Naval Shipyard (Bremerton) captured 5 months later."
  - year: "2015-2017"
    event: "Siege positioning against McChord AFB + Fort Lewis."
  - year: 2017
    event: "Great Ghost Dance (2017-08-04) — Howling Coyote leads ritual; Mount Hood / Mount St. Helens / Mount Rainier / Glacier Peak erupt simultaneously."
  - year: 2018
    event: "Treaty of Denver signed April 2018; War Council dissolves into civilian Salish-Shidhe Council."

atrocities_note: |
  Both sides committed documented atrocities. Thunder Tyer personally
  linked to some; same command also responsible for the Mount Rainier
  Anglo-evacuation order (see Data/Lore/NPCs/Thunder Tyer.yaml for
  the moral-contradiction detail).

