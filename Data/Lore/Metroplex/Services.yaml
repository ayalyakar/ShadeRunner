salish_shidhe_council_access:
  source_page: 12
  overview: |
    The Salish-Shidhe Council (SSC) is a sovereign Native American nation
    adjacent to Seattle. Visiting SSC lands from Seattle requires a
    'blue ticket' (blue-form travel pass) issued by the SSC, not the
    UCAS or Seattle government.
  entry_points:
    - name: "Seattle Visitor Center"
      role: "Information + forms"
      notes: "SSC representatives staff a counter here; they supply application forms but cannot issue the pass."
    - name: "Passport Lodge"
      location: "Council Island (southern Lake Washington)"
      role: "Issues blue tickets."
      notes: |
        In-person application required. Cab fare from the Visitor
        Center to Council Island; drop-off at the Passport Lodge.
  process:
    - "In-person application at the Passport Lodge."
    - "Present up-to-date credstick passport file."
    - "Itinerary / purpose check."
    - "Pass issued after ~1 day processing."
  pass_validity:
    tourist_days: 15
    extended_with_approved_itinerary_days: 30
    extended_transcription_note: "Extended-duration upper bound read as '1 month / up to 30 days'; value approximate."
  in_country_rules:
    - "Travel pass must be displayed prominently while inside SSC lands."
    - "Overstaying or concealing the pass can trigger SSC authority action (detention / expulsion)."
  council_island:
    role: "Center of SSC representation in Seattle."
    location: "Southern Lake Washington."
    notes: |
      Council Island has its own sovereign character and will get its
      own district-level data file when Council Island chapter is
      ingested (Data/Lore/Districts/Council Island.yaml planned).

legal_assistance:
  source_page: 12
  nac_lu:
    full_name: "North American Civil Liberties Union"
    abbreviation: "NACLU"
    seattle_hotline: "555-LVL115"
    hotline_transcription_note: "Digits read as 'LVL115'; low confidence, likely an alphanumeric mnemonic like 'LEGAL' or similar."
    role: "Refers callers to competent lawyers."
  specialty_hotlines:
    - audience: "Native Americans"
      number: "555-TRBL"
      notes: "'Tribal' mnemonic; referral to lawyers + advocacy groups familiar with NAN / tribal-law cases."
    - audience: "Orks and troll community"
      number: "555-ORKS"
      notes: "Metahuman advocacy line."
    - audience: "Elves"
      number: "555-ELVS"
      notes: "Metahuman advocacy line."
  notes: |
    In-world hotlines are all '555-' prefixed diegetic phone numbers —
    useful as Commlink UX references (see Presentation/DESIGN - UI.md).
    Can appear in NPC dialogue, arrest scenes, street-lawyer contact
    introductions.

medical_assistance:
  source_page: 12
  public_system:
    name: "City Hospitals Health System"
    funding: "Government-subsidized."
    capability: "Handles most emergencies; hospitals + clinics citywide."
    transport_modes: ["ambulance", "helicopter"]
  private_system:
    name: "DocWagon"
    faction_ref: "Data/Lore/Factions/DocWagon.yaml"
    reputation: "Well-respected; premium emergency-response service."
    vehicles: ["armored cars", "helicopters"]
    service_model: "Customer-based; subscribers get armed emergency extraction on call."
  hmos:
    - name: "City Health"
      audience: "City of Seattle employees."
      operator: "City of Seattle."
    - name: "Group Medical"
      audience: "General Seattle residents."
      operator: "City of Seattle."
      notes: "Citizens with a valid city-organization membership get covered care during their stay."
  tourist_advice:
    - "Carry an up-to-date medical file on credstick."
    - "Keep a duplicate in a safe location."
  game_presence:
    mvp: "ambient — street doc is the primary PC healing path; DocWagon is flavor / high-tier emergency response."
    post_mvp: |
      DocWagon subscription as a lifestyle line-item (buy coverage,
      push-button rescue). City Hospitals runs as a setting for
      extraction / ICU runs. HMO gating for some prestige clinics.

chips_and_alcohol:
  source_page: 12
  chips_and_drugs:
    policy: "Seattle tries to maintain strict control over illegal chips and drugs."
    programs:
      - "Child-targeted anti-drug education."
    enforcement_reality: |
      Programs are perpetually underfunded and local law enforcement
      lacks capacity to make them effective. Canonical gap between
      stated policy and street reality.
  alcohol:
    policy: "Alcohol is the only legal recreational drug."
    control_model: "Government-controlled distribution."
    retail:
      wine_and_beer:
        allowed_in: ["grocery stores", "convenience stores"]
      hard_liquor:
        allowed_in: ["city-run liquor stores only"]
    price_markup_vs_ucas_pct: 25
    markup_rationale:
      - "Massive liquor tax."
      - "Transport cost to Seattle from producing regions."
    liquor_store_hours:
      open: "10:00"
      close: "20:00"
      days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
      weekend_note: |
        Prose on p.12 only lists Mon-Fri. Whether city-run liquor
        stores open on weekends is ambiguous; flag as open question.
      transcription_note: "Weekend hours not stated in the page image; may be explicit elsewhere."
  game_presence:
    mvp: "ambient — drug-addiction system hooks into these markets; alcohol is cheap across the board but 25% above rest-of-UCAS."
    post_mvp: "Drug-war runs (raid vs. ring / cop-payoff); liquor-tax smuggling subplot."

