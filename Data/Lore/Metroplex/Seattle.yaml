      notes: "Original sub-streets preserved beneath current ground level."
    - year: 2039
      event: "Night of Rage"
      notes: |
        Prose attributes an influx of Orks fleeing Night-of-Rage violence
        through the sewers as part of the community's origin mythology.
        (Page image reads ambiguously on whether year is 2039 or 2009;
        SR canon says 2039.)
      transcription_note: "Year read as 2039 per canon; image scanned character is ambiguous."
    - year: 2041
