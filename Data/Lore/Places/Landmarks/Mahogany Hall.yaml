  former_name_provenance: "Named the 'Charles Royer Building' in a prior era; renamed to 'Mahogany Hall' at an unstated date."

security_architecture:
  source_page: 22
  canonical_description: "Security is external-facing: triple-thick safety glass + plenty of guards at the entrances, to prevent attacks FROM outside."
  documented_gap: |
    No special internal security for politicians and employees inside
    the building. Both 2045 + 2049 shooting incidents were carried
    out by insiders (a councilman in 2045; a BTL-addicted secretary
    in 2049). SPD canonically warned the city about this gap; it was
    ignored (per SPD BBS post on p.22).
  mechanical_hint: |
    Post-MVP run: bypass external security becomes moot once you
    have insider access. Infiltrate via employment / blackmail /
    lift-of-insider's-credstick rather than frontal assault.

