    Canonical civic-pride anchor. Referenced as a continuity point
    (the same view the city's first settlers saw 300 years ago) in
    a sourcebook otherwise steeped in discontinuity (Awakening, war,
    Goblinization, Night of Rage).
  implied_use:
    - "Tourist viewpoint."
    - "Premium residential real estate on the slopes / peak (implied by altitude + vista)."
    - "Strategic observation position."

