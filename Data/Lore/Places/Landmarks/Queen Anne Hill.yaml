# Canonical landmark — highest point of Downtown Seattle.

name: "Queen Anne Hill"
type: "Landmark / Hill"

sources:
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 21
    image: "Sources/SR1E-Seattle/p021-downtown-geography-demographics.png"
    section: "Downtown — Geography and Demographics"

location:
  district: "Downtown"
  neighborhood: null
  neighborhood_note: "Named 'Queen Anne' in real-world Seattle; canonically the eponymous neighborhood centered on the hill."

description: |
  Highest point of ground in downtown Seattle. Slope rises from the
  Elliot Bay waterfront to Queen Anne Hill's peak; canonical viewpoint
  offering unchanged-for-300-years vistas:
  - West: Puget Sound + Olympic Mountains.
  - East: Lake Washington + Cascade Range.
  - South: Mount Rainier dominates.

