description: |
  Waterfront pier on Tacoma's industrial docks. Used in Queen Euphoria
  as a neutral off-corp meet site for the runners' briefing with the
  Ludivenko Mr. Johnson. The pier is wooden, heavy-built, extends ~100m
  over the water; a road parallels the pier on land. Few ships dock
  at the pier by night; the location is deliberately chosen for its
  isolation. Ambient register (authoring cue): wet wooden planking,
  salt air, distant harbor machinery, an incandescent street lamp on
  the approach road, sodium halos, occasional motorcycle / sedan
  traffic during the meet arrival window.

night_activity_pattern:
  before_9pm: "Last dockside business finishes; area empties."
  after_9pm: "Deserted except for planned meets. Light police patrol presence."
  meet_window:
    time: "11pm"
    arrivals_on_scene_per_p9:
      - "Lanky Latino bodyguard (Juan Diablo) disembarks a Toyota Elite - beret, combat-ready posture."
      - "Harley Scorpion motorcycle rolls up; chromed, ridden by an Ork (gang / courier register)."
      - "Mr. Johnson steps out of the sedan at the meet point."
    note: "Arrivals cadence on p.9 is staggered and deliberately theatrical. ShadeRunner adaptation: preserve the stagger as a short arrival cinematic."

uses_canonical:
  - context: "Queen Euphoria / Wake Up Call briefing referent"
    time: "11pm"
    party: "runners (individually briefed per module; solo PC in ShadeRunner adaptation) + Mr. Johnson + Juan Diablo"
    source_page: [8, 9, 10]

security_posture:
  overt: "Minimal - open dockside approach."
  covert_implied: "Johnson's cut-out hiring pattern + Diablo's loadout + the Toyota Elite's armored profile imply a low-key but competent protective perimeter around Johnson. Not detailed in force composition."
  civil: "Occasional police patrol on the approach road (p.10 implies rather than states; passing rather than stationed)."

adaptation_notes:
  - "ShadeRunner scene design: dockside-at-night is the visual / audio register. Wet concrete + wooden planks, sodium-vapor halos, intermittent cargo-crane silhouettes, ambient foghorn / water-lap SFX. Place file is the venue ref for Wake Up Call and Off and Running scenes."
  - "Solo-PC play collapses the one-at-a-time interview cadence (p.8 canon) into a single meet. Retain the staggered-arrival (Diablo first, then Johnson) cinematic cadence from p.9 for mood."
  - "The keycard-handoff beat is the concrete object that marks the scene transition from Pier 36 to Royal Meadows Apartments; wire it as an explicit inventory pickup."

game_presence:
  mvp: "out of MVP scope."
  post_mvp: "Wake Up Call / Off and Running venue when Queen Euphoria is adapted."

transcription_gaps:
