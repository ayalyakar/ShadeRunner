  less_than_12_years: 0.78
  high_school_equivalency: 0.18
  college_equivalency: 0.03
  advanced_studies_certificates: 0.01

geography:
  terrain: "Mostly flat; few existing hills concentrated in the southern end."
  hydrology:
    - name: "Snoqualmie River"
      notes: |
        Drains approximately one third of the district. Also a shipping
        artery for Redmond factories (p.129).
    - name: "Beacon Lake"
      notes: |
        Contaminated by Tritium Services' 2013 partial meltdown; core of
        Glow City (p.130).
  landmarks:
    - name: "Renton Corner Mall / Redmond Center"
      notes: |
        Recovery/rebuilding project championed by Mayor Gasston; cited as
        the first sign of the district's economic revival in decades.
        Hosts the Redmond Center Hotel. Yakuza surveillance rumor attached
        (p.130).
    - name: "Union Hill Road"
      notes: "Home of Redmond Phoenix House restaurant (p.129)."
    - name: "Novelty Hill Road / W. Snoqualmie Valley Road intersection"
      notes: "Location of Skoofin Hill Manor & Eat (p.130)."
    - name: "Capitol Building"
      notes: "Civic anchor of the developed Touristville strip (p.130)."
  logistics:
    source_page: 129
    modes:
      - "helicopter"
      - "tilt-rotor aircraft"
      - "Snoqualmie River barge"
    notes: |
      Ground shipments attract desperate squatters who raid convoys for
      raw materials. Redmond factories rely on air and river logistics
      as a result.

history_hooks:
  - year: 2013
    event: "Tritium Services partial meltdown"
    notes: |
      Pre-game backdrop; nuclear plant partial meltdown contaminated
      Beacon Lake and kilometers around it. Direct origin of Glow City.
  - year: 2028
    event: "Shiawase America replacement plant built"
    notes: |
      Pre-game backdrop; Shiawase erects new plant next to Tritium's ruined
      hulk. Operational ever since; supplies Seattle power from Redmond.
  - year: 2029
    event: "Computer Crash of '29"
    notes: "Pre-game backdrop; economic devastation of the district."
  - year: 2032
    event: "VITAS outbreak"
    notes: "Pre-game backdrop; population collapse, social fabric broken."
  - year: 2039
    event: "Night of Rage"
    notes: "Pre-game backdrop; drove metahuman clustering / self-defense patterns."
  - year: null
    event: "Redmond Hellhounds attack"
    notes: "Pre-game backdrop; canonical gang incident that shaped the Barrens."
  - year: null
    event: "Del Secondi Mafia schism"
    notes: |
      Del Secondi and supporters declared independence from the Seattle Mafia.
      Del Secondi was summarily executed; his renegade faction continues to
      challenge for control of the district.
  - year: 2048
    event: "Jeffrey Gasston elected Mayor of Redmond"
    notes: "Drives the Renton Corner Mall / Redmond Center recovery project."

# District-level sub-areas. Touristville nests its own neighborhoods.
sub_areas:
  - name: "Touristville (aka 'Redmond' informal)"
    description: |
      The most well-developed and orderly section of the district, due to
      the Capitol Building and proximity to Bellevue. Home to all legitimate
      tourism. Even so, most neighborhoods here are Squatter-tier; this is
      the "best" Redmond gets.
    source_pages: [130]
    neighborhoods:
      - name: "Sophistos"
        lifestyle: "Squatter"
      - name: "Brats Heaven"
        lifestyle: "Street"
      - name: "Partys"
        lifestyle: "Squatter"
        transcription_note: "Spelling uncertain; image partially legible."
      - name: "Acondole"
        lifestyle: "Squatter"
        transcription_note: "Spelling uncertain."
      - name: "Klingenpers"
        lifestyle: "Squatter"
        transcription_note: "Spelling uncertain; possibly 'Klingenberg' or similar."
      - name: "Woodlanders"
        lifestyle: "Squatter"
      - name: "Hollywood"
        lifestyle: "Low"
        notes: |
          Also the Red Hot Nukes gang turf (p.128) and home of the
          Hollywood Simsense Entertainments facility (p.129).

  - name: "Rat's Nest (North Seattle Garbage Center)"
    description: |
      Huge open-air garbage dump that is home to roughly a thousand
      squatters. Known for a canonical concentration of Rat-totem
      shamans — a distinct magical community.
    source_pages: [130]
    magical_note: "Rat-totem shaman community; see Design/Systems/DESIGN - Magic.md."

  - name: "The Plastic Jungles"
    description: |
      Complex of 20 large greenhouses built by a wealthy agricultural
      interest at the turn of the century on land thought too toxic for
      crops. Harvests succeeded but were contaminated for human
      consumption. Repurposed to tropical flowers until abandoned after
      the Crash of '29. Now home to much of the district's metahuman
      squatter population.
    source_pages: [130]

  - name: "Glow City"
    description: |
      Radioactive zone born of Tritium Services' 2013 partial meltdown.
      Adjacent to the operational Shiawase America replacement plant
      (2028). Squatter population has tripled since Crash of '29 despite
      extraordinary cancer rates and infant mortality.
    source_pages: [130]

  - name: "Bargain Basement"
    description: |
      Pre-Crash premium apartment district. Now structurally decayed;
      illegal power/ventilation hook-ups keep buildings habitable. Home
      to street markets and bazaars with Mafia and Yakuza black markets
      flourishing. Crimson Crush gang haunts this area (p.128).
    source_pages: [128, 130]

  - name: "Bellevue-border strip"
    description: |
      The only part of Redmond with functioning civic law; occasional
      Lone Star patrols. Rest of the district is effectively ungoverned.
    source_pages: [129]

  - name: "Redmond Barrens"
    description: |
      Lawless core of the district; MVP starter ground. Umbrella term for
      the ungoverned majority of Redmond excluding the developed Touristville
      strip and the Bellevue-border zone.

government:
  source_pages: [128, 129, 130]
  corruption_rate: 0.33
  practical_control: |
    Most of the district is not meaningfully governed. Only a narrow strip
    along the Bellevue border shows respect for law and order. Elsewhere,
    only occasional Lone Star patrols surface. Almost the entire district
    carries an A security rating — SR's worst.

