# Per-district override of the global police response data.
# See Design/Systems/DESIGN - Combat.md for the global escalation model.
police_response:
  minimum_squad_size: 4
  standard_vehicles:
    - "Aero Citymaster"
    - "Nissan Patrol-1"
  government_corruption_rate: 0.33
  source_page: 128
  notes: |
    Patrols never leave station in less than four-man squads because the
    streets are too dangerous. Vehicles chosen for riot capacity and crew
    lift. Roughly a third of Redmond government is tied to the syndicates
    (Mafia and Yakuza) — affects bribe availability and reliability of
    official channels.

# Shadowland posts quoted in the extracts.
# Policy: verbatim ingest as in-game BBS content (see Narrative/DESIGN - Writing.md).
# Image legibility is the current gating factor on transcription.
shadowland_posts:
  - source_page: 127
    handle: null
    text: null
    notes: "Fragment mentions abandoned buildings, darkened alleys, scavengers' life. Transcribe from clearer source."
  - source_page: 128
    handle: "Marcuson"
    text: null
    notes: |
      Compares Redmond and Puyallup Barrens; Redmond tougher (more people,
      thinner air, worse racism). Transcribe full text.
  - source_page: 128
    handle: null
    text: null
    notes: |
      Critical of Mayor Gasston (inexperienced, grand plans, free-spending
      ways drain the district's coffers).

calibration:
  per_capita_income_anchor_yen_per_year: 6000
  per_capita_income_anchor_yen_per_month: 500
  notes: |
    Anchor for lifestyle tier pricing and run-payout curves.
    A Low-tier apartment (~2,000¥/mo) is ~4x median Redmond monthly income,
    matching a working runner's precarious economic framing.
