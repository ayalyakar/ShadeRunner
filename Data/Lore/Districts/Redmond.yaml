metatype_mix:
  human: 0.87
  elf: 0.06
  dwarf: 0.01
  ork: 0.10
  troll: 0.01
  other: 0.01

metatype_distribution_pattern:
  clustering: true
  source_page: 128
  notes: |
    Since the Night of Rage (2039), metahumans cluster for self-defense rather
    than distributing evenly across the district. Procgen should apply
    neighborhood-level clustering to metatype sampling, not a flat district-wide
    mix. See Design/World/DESIGN - Procgen.md for the rule.
  known_concentrations:
    - sub_area: "The Plastic Jungles"
      note: "Home to much of the district's metahuman squatter population (p.130)."

