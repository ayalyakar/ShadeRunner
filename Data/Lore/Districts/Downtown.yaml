metatype_mix:
  human: 0.63
  elf: 0.15
  dwarf: 0.02
  ork: 0.19
  troll: 0.01
  other: 0.01
  sum_note: "Sums to 101% — rounding artifact, retained as canonical."
  contrast_note: |
    Notably Elf-rich (15%, vs 6% in Redmond) and Dwarf-present (2%,
    vs 1% in Redmond). Ork share (19%) substantially above Redmond
    (10%) — reflects the Ork Underground community beneath the
    district. Cross-ref Metroplex/Seattle.yaml ork_underground.

education:
  source_page: 19
  less_than_12_years: 0.25
  high_school_equivalency: 0.45
  college_equivalency: 0.18
  graduate_or_advanced: 0.12
  sum_check: 1.00
  contrast_note: |
    Education skew is the inverse of Redmond-era data from the prior
    pass: Downtown has 30% college+graduate; Redmond had 4%. Supports
    the corporate-affiliation / per-capita-income delta.

description:
  source_page: 19
  summary: |
    Downtown is Seattle's main business district. Not purely a forest
    of skyscrapers — shops, parks, theaters, museums, and hotels are
    interleaved throughout. A mix of corp-tower density + civic and
    retail texture.
  resident_register: "Typical resident complains of crowds, smoggy air, and crime — same profile as a typical New Yorker or Chicagoan."
  weekend_character: |
    Sidewalks pack on weekends with visitors from outlying districts
    who come into Downtown to shop, club, or otherwise spend the day.
    Cross-district traffic is a defining feature.
  smog_character: |
    Even during Stage Red smog alerts, Downtown is full of shoppers
    and clubgoers — citizens wear breathers and carry on. Canonical
    cultural quirk: Seattle weather is bad, Seattle commerce is
    bulletproof.

environment:
  source_page: 19
  rain:
    chemical_register: "Acid enough to pit and stain buildings and to ruin clothing."
    benefit: "Scrubs particulate air pollution. Canonical net-positive despite its downsides."
  smog:
    stage_red_alerts_per_year_metroplex_avg: 90
    geographic_distribution:
      cleaner_zones:
        - "Coast"
        - "Parts of the Snohomish District"
        - "'Fairly lake' areas"
      cleaner_zones_transcription_note: |
        Scan reads ambiguously — possibly 'fairy tale' or 'fairly lake'
        or 'parts far inland'. Captured loosely; revisit.
      perpetual_smog_zones:
        - "Redmond Barrens"
        - "Other A-rating districts"
      perpetual_smog_transcription_note: "Prose says 'the Barrens seem perpetually enshrouded in the deadly haze'; Redmond-era prior-pass canon confirms. Generalized here."
    prevailing_wind: "West"
    air_quality_summary: |
      Despite the smog, Seattle air averages relatively clean on the
      continent — west winds + rain wash do the work.

geography:
  source_page: 21
  continuity: |
    Seattle's downtown terrain has remained virtually unchanged for
    over a century — unusual in the 2050 era. Most contemporary city
    governments have leveled hills, filled in lakes, or otherwise
    remade their downtown topology.
  waterfront:
    location: "Along Elliot Bay."
    character: "Low and flat; restaurants, shops, hotels, and attractions cluster here."
    appeal: "Canonical tourist + waterfront register — the 'sparkly' Seattle front face."
  slope:
    character: "Away from the waterfront, terrain rises steeply into hills steep enough to challenge even the physically fit."
    architecture: |
      Most non-waterfront buildings are built directly into the
      sloping ground, with catwalks and elevators linking levels.
      Canonical Seattle 'multi-level downtown' flavor.
  peak_viewpoint:
    location: "Queen Anne Hill — highest point of downtown."
    vistas:
      west: "Puget Sound + Olympic Mountains."
      east: "Lake Washington + Cascade Range."
      south: "Mount Rainier dominates."
    heritage: "Same vistas the city's first settlers saw 300 years ago; canonical civic-pride landmark."
  bodies_of_water:
    - name: "Elliot Bay"
      role: "Primary waterfront; freight + tourism; southern edge is the Duwamish River mouth."
    - name: "Puget Sound"
      role: "Beyond Elliot Bay to the west; large-vessel shipping + ferry routes."
    - name: "Lake Washington"
      role: "East boundary of downtown; Council Island sits in its southern portion (cross-ref Metroplex/Seattle.yaml salish_shidhe_council_access)."
    - name: "Lake Union"
      role: "Nestled in a hollow between two lines of hills north of downtown; paired with Green Lake."
    - name: "Green Lake"
      role: "Paired with Lake Union in the hollow; farther-out residential / flatland boundary."
    - name: "Duwamish River"
      role: "Heavily channeled river; flat broad mouth forms southern edge of Elliot Bay."
      industry: "Heavy freight docks + factories line both banks of the flat-mouth region."
      economy_note: "Canonically vital to Seattle's shipping + industrial economy."
  flatlands_beyond_green_lake: "Broad flat former farmland north of the hills; residential / low-density land use now."
  hills_and_small_lakes: "Rest of the district is broken up by hills and small lakes; varied topography."

demographics_extension:
  source_page: 21
  cosmopolitan_note: |
    Canonically the most cosmopolitan district in the metroplex.
    Elves + Orks together account for ~34% of downtown population
    (15% + 19%). Combined with 63% Human and 2% Dwarf, the cultural
    mix is the densest in Seattle.
  ethnic_and_metatype_neighborhoods:
    - name: "International District"
      demographic: "Historically Oriental / Asian-American (originally a forced-settlement zone)."
      syndicate_turf: "Yakuza (explicit extortion zone per p.21)."
      file: "Data/Lore/Districts/Downtown/International District.yaml (to be created when specific-place-focus pages ingest)"
      note: "Neighborhood gets its own sub-file once additional detail arrives."
    - name: "Elven District"
      demographic: "Elven-majority neighborhood — newer ethnic zone."
      note: "May have Tir Tairngire cultural influence; resolve on future pages."
      transcription_note: "Named plainly as 'the Elven District'; exact neighborhood name may be canonical under another label."
    - name: "Ork District"
      demographic: "Ork-majority, subterranean."
      location: "'Lies beneath the city streets' — canonically the Ork Underground."
      cross_ref: "Metroplex/Seattle.yaml ork_underground"
      note: "Downtown's Ork share (19%) is heavily concentrated here."
    - name: "Harbor Island"
      demographic: "Industrial / waterfront; population mix not stated on p.21."
      syndicate_turf: "Mafia (explicit extortion zone per p.21)."
      note: "Location at the Duwamish-mouth / Elliot-Bay freight-dock zone is implied."

crime_block:
  source_page: 21
  headquarters_note: "Downtown Seattle is the HQ + 'chief area of concern' for both the Yakuza and the Seattle Mafia."
  revenue_share: "Downtown generates ~1/3 of both syndicates' yearly metroplex take."
  turf_zones:
    yakuza:
      neighborhood: "International District"
      description: |
        In certain sections, nearly every business is Yakuza-owned or
        pays extortion to remain open.
    mafia:
      neighborhood: "Harbor Island area"
      description: |
        Harbor Island sections run on a similar ownership /
        extortion model for the Seattle Mafia.
  street_crime_profile:
    targets:
      - "Jewelry stores stuffed with glittering stones."
      - "Corp officials showing wealth + status on the sidewalks."
      - "Tourists 'so enamored' of the sights they forget to secure possessions."
    summary: "Downtown crime is high despite high corp-security — targets are plentiful and concentrated."
  game_presence:
    mvp: "lore / ambient (MVP district is Redmond)."
    post_mvp:
      - "International District as Yakuza-turf runnable zone."
      - "Harbor Island as Mafia-turf runnable zone."
      - "Syndicate-HQ infiltration at the high end of the run-tier ladder."

government_block:
  source_page: 21
  corruption_register: |
    Downtown politicians are canonically openly corrupt — 'no bones'
    made about payoffs being required to get anything done in district
    government. 'Efficiency incentives' is the local euphemism for
    bribery.
  canonical_price_point:
    item: "Pothole repair in front of your house"
    bribe_yen: 300
    turnaround: "Next-day service."
  syndicate_influence:
    description: |
      Mafia + Yakuza both carry substantial rosters of low- and mid-
      level Downtown government officials 'in their pockets'. The
      bribery layer makes syndicate control of Downtown politics
      canonical, not rumored.
  contrast_with_other_districts: |
    Prose implies other districts have 'loftier sentiments and
    practical sensitivity' that restrain open corruption. Downtown
    is noted as distinctively unabashed about the graft.

