crime_block:
  source_page: 21
  headquarters_note: "Downtown Seattle is the HQ + 'chief area of concern' for both the Yakuza and the Seattle Mafia."
  revenue_share: "Downtown generates ~1/3 of both syndicates' yearly metroplex take."
  turf_zones:
    yakuza:
      neighborhood: "International District"
      description: |
        In certain sections, nearly every business is Yakuza-owned or
        pays extortion to remain open.
    mafia:
      neighborhood: "Harbor Island area"
      description: |
        Harbor Island sections run on a similar ownership /
        extortion model for the Seattle Mafia.
  street_crime_profile:
    targets:
      - "Jewelry stores stuffed with glittering stones."
      - "Corp officials showing wealth + status on the sidewalks."
      - "Tourists 'so enamored' of the sights they forget to secure possessions."
    summary: "Downtown crime is high despite high corp-security — targets are plentiful and concentrated."
  game_presence:
    mvp: "lore / ambient (MVP district is Redmond)."
    post_mvp:
      - "International District as Yakuza-turf runnable zone."
      - "Harbor Island as Mafia-turf runnable zone."
      - "Syndicate-HQ infiltration at the high end of the run-tier ladder."

government_block:
  source_page: 21
  corruption_register: |
    Downtown politicians are canonically openly corrupt — 'no bones'
    made about payoffs being required to get anything done in district
    government. 'Efficiency incentives' is the local euphemism for
    bribery.
  canonical_price_point:
    item: "Pothole repair in front of your house"
    bribe_yen: 300
    turnaround: "Next-day service."
  syndicate_influence:
    description: |
      Mafia + Yakuza both carry substantial rosters of low- and mid-
      level Downtown government officials 'in their pockets'. The
      bribery layer makes syndicate control of Downtown politics
      canonical, not rumored.
  contrast_with_other_districts: |
    Prose implies other districts have 'loftier sentiments and
    practical sensitivity' that restrain open corruption. Downtown
    is noted as distinctively unabashed about the graft.
  lone_star_dossier_system:
    source_page: 22
    scope: "Whole city (not just Downtown)."
    coverage: "Lone Star's organized-crime division maintains a dossier on every city official across the Seattle Metroplex."
    implication: |
      Every city councilperson has been under suspicion at some point;
      not all are corrupt, but institutional mistrust is canonical.
      Cross-reference Design/World/DESIGN - Economy.md 'Bribery' +
      new 'Dossier leverage' mechanic.
    mechanic_cross_ref: "Design/World/DESIGN - Economy.md lone_star_dossier_leverage"
  canonical_corruption_case:
    source_page: 22
    year: 2048
    official:
      name: "Bob Perkins"
      file: "Data/Lore/NPCs/Bob Perkins.yaml"
      role: "Councilman of the First Hill area"
    sting:
      agents: ["Lone Star (organized-crime division)", "FBI"]
      cover: "Undercover as Mafia Don James O'Malley's men."
      evidence: "Filmed and recorded accepting money."
    outcome:
      sentence: "Two-year suspended sentence."
      post_conviction_role: "Adviser to the Honesty in Government policlub."
      file: "Data/Lore/Factions/Honesty in Government.yaml"
    irony: "The corrupt-and-caught councilman ended up as adviser to the ethics policlub."

politics:
  source_page: 22
  register: |
    'Downtown politics always manages to be a little more crowded, a
    little noisier, and a little smellier than its streets' (quoted
    former councilman per p.22). Citizen participation high; candidate
    fields large; elections quickly devolve from issue-focused to
    popularity-contest ('whitest teeth, most money, most dirt on
    opponents').
  mayor:
    name: "Ivar J. Lindstrom"
    alt_names: ["Ivan Lindstrom"]
    file: "Data/Lore/NPCs/Ivar Lindstrom.yaml"
    role: "Mayor of Downtown (currently serving third term; re-elected 2048)."
    lineage: "Son of Charles C. Lindstrom (Metroplex's first Governor). Lost the 2039 gubernatorial special election to Schults (see History/Schults-Era.yaml)."
    voter_profile: "Handsome, articulate, energetic; voter favorite for the past ~10 years."
    signature_stance: "Strongly supports the boisterous debating in district chambers. Quote: 'Seattle is more than just pretty buildings and a sea breeze.'"
    press_nickname: "The city's 'gutsy mayor'."
    press_nickname_origin: "Sat impassively under his desk during two council-chamber shootings while other councilmen cowered. Press couldn't decide if it was bravery or stupidity."
  council_chamber_violence:
    source_page: 22
    events:
      - year: 2045
        description: "A disgruntled councilman emphasized his opposition to a gun-control bill by shooting the councilman who authored it. The bill failed to pass."
        file: "Data/Lore/History/Council-Shooting-2045.yaml"
        outcome: "Bill killed; shooter's fate canonically unstated."
      - year: 2049
        description: "A BTL-addicted ('wide-addicted') secretary went berserk in the chambers, killing one councilman and wounding three others."
        file: "Data/Lore/History/Council-Shooting-2049.yaml"
        outcome: "Shooter's fate canonically unstated; security reforms not enacted per post-shooting prose."
    transcription_note: "'Wide-addicted' reads as a possible BTL-addiction euphemism ('wired' on chips). See Sources/VERIFICATION.md."
  council_chamber_venue:
    name: "Mahogany Hall"
    former_name: "Charles Royer Building"
    file: "Data/Lore/Places/Landmarks/Mahogany Hall.yaml"

federal_intel_presence:
  source_page: 22
  overview: "Downtown is the center of FBI and NSA presence in Seattle."
  agencies:
    - name: "FBI (Seattle)"
      file: "Data/Lore/Factions/FBI (Seattle).yaml"
      role: "Federal investigation + Lone Star sting-op partner (per 2048 Perkins case)."
    - name: "NSA (Seattle)"
      file: "Data/Lore/Factions/NSA (Seattle).yaml"
      role: "Signal intelligence + surveillance; aggressive interview practices per Smiley's BBS post."
  resident_register: |
    Canonical 'you haven't lived until you've been talked to by thugs
    in pretty suits from your friendly neighborhood government
    intelligence agency.' Adds to general Downtown paranoia baseline.

megacorp_intel_presence:
  source_page: 22
  note: |
    Downtown megacorp intelligence divisions contribute to the paranoia
    baseline. Mitsuhama specifically named for torture + mind-altering
    drug use in intel ops — canonical anchor for the project's
    'corporate torture register.'
  named_corps:
    - name: "Mitsuhama Computer Technologies"
      file: "Data/Lore/Factions/Mitsuhama Computer Technologies.yaml"
      register: "Torture + mind-altering drugs in intel ops (canonical per p.22)."
      nsfw_cross_ref: "Meta/DESIGN - NSFW.md — graphic violence / torture pillar anchor."

press_register:
  source_page: 22
  overview: |
    Seattle Video stations swarm any high-profile crime scene within
    minutes, arriving with bright lights and pushy reporters. Cops
    canonically get ~5 minutes of undisturbed crime scene before
    press descend 'like vultures on a carcass, stumbling about,
    touching things, destroying evidence' (Smiley).
  mechanical_hint: "Press-arrival timer as a post-MVP crime-scene-stealth mechanic."

