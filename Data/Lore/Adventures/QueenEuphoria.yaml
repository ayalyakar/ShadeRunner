# Per-scene entries for 'The Adventure'. Scenes populate as each chapter
# page ingests. Prose fields are SUMMARIES (per the fidelity policy; no
# verbatim transcription). Each scene captures the SR1E module sections
# defined on printed p.5: tell_straight_summary, behind_scenes_summary,
# and debugging_summary, plus ShadeRunner adaptation hooks.
scenes:
  - id: wake_up_call
    title: "Wake Up Call"
    page: 8
    order_in_adventure: 1
    tags: [opening, hook, meet, videophone]
    entities_introduced:
      npc_refs:
        - "Data/Lore/NPCs/Ellery Whitecastle.yaml"
        - "Data/Lore/NPCs/Mr. Johnson (Ludivenko, Queen Euphoria).yaml"
      faction_refs:
        - "Data/Lore/Factions/Ludivenko Corporation.yaml"
      place_refs:
        - "Data/Lore/Places/Docks/Pier 36 (Tacoma).yaml"
    cross_refs_out:
      next_on_accept: "deja_vu"
      next_on_accept_page: 27
      legwork_on_whitecastle_page: 56
      fallback_on_refusal: "re-call other PCs; four-day timeout then skip to deja_vu"
    tell_straight_summary: |
      The PC is woken late by a videophone call after a heavy night out.
      The caller is a man in an expensive suit with slicked-back black
      hair and green cybereyes; he opens with a friendly 'greetings,
      chummer' and offers a job.
    behind_scenes_summary: |
      The caller is Ellery Whitecastle, a local Fixer hired by the
      Ludivenko Corporation. Whitecastle's job is to assemble a
      shadowrun team and broker the meet between them and an executive
      Mr. Johnson from Ludivenko. Whitecastle knows the PCs through his
      own street sources (or, if the party ran the earlier Shadowrun
      adventure 'Mercurial', via that prior big-name-star experience).
      He keeps the brief deliberately thin - he does not know the run
      specifics and can only suspect Ludivenko as the ultimate client.
      Mr. Johnson will meet the runners at Pier 36 on the Tacoma docks
      at 11pm that evening. Whitecastle's own fee depends on the
      runners actually showing up, so he repeats key details. He is a
      moderately successful Fixer using the SR1E core Fixer Contact
      archetype (p.167); his videophone appearance is stylish but his
      actual lifestyle is modest.
    debugging_summary: |
      If the PC declines or fails to assemble the team, Whitecastle
      re-calls other PCs until one bites. If nuyen isn't enough, the
      module recommends applying street hardship (mugging, theft,
      Matrix crime) to renew motivation. Last resort: skip the opening
      run entirely - four in-world days pass, then cut straight to the
      Deja Vu scene (p.27).
    adaptation_notes:
      - "Whitecastle is the videophone voice; Mr. Johnson is the dockside meet. Two distinct NPCs with two distinct voices."
      - "Solo-PC play: the one-at-a-time interview cadence collapses to a single meet. Preserve the videophone-then-dockside beat structure as two UI scenes."
      - "The 'Mercurial' prior-adventure continuity hook is a reference to a different SR1E adventure module, not an NPC. Flagging here so it is not re-misread in future ingestions."
      - "Narrative register: night-after hangover framing (the PC wakes groggy and throat-raw). Art-direction / audio cue - interior, late-night, dim lighting, urban ambient; harbor-dockside night for the Pier 36 beat."
    cross_adventure_references:
      - adventure_title: "Mercurial"
        relationship: "Optional prior-adventure continuity - if PCs ran 'Mercurial', Whitecastle's reason for selecting them cites that experience."
        note: "This is NOT a ShadeRunner-canon adventure; it is an external SR1E adventure module referenced by title only on p.8. Flagged to avoid confusion with NPC-named fixers."
    transcription_gaps:
      - "Mr. Johnson's real name, metatype, physical description, and stats are not on p.8 (identity deliberately withheld by the module at this beat)."
      - "Specific SR1E page for Fixer Contact stat reference given as p.167; not yet cross-linked to a ShadeRunner stat file."

  - id: off_and_running
    title: "Off and Running"
    page: 9
    pages_spanned: [9, 10]
    order_in_adventure: 2
    tags: [meet, negotiation, hook, dockside, handoff]
    entities_introduced:
      npc_refs:
        - "Data/Lore/NPCs/Juan Diablo.yaml"
      place_refs:
        - "Data/Lore/Places/Apartments/Royal Meadows Apartments.yaml"
      products_refs:
        - "Data/Lore/Products/Amber Gel.yaml"
    entities_expanded:
      - "Data/Lore/NPCs/Mr. Johnson (Ludivenko, Queen Euphoria).yaml (first on-screen appearance + negotiation stats)"
      - "Data/Lore/Places/Docks/Pier 36 (Tacoma).yaml (~100m wooden pier; dockside context; staggered-arrival cinematic)"
    cross_refs_out:
      next_on_accept:
        scene_id: "royal_meadows_hideout_prep"
        scene_id_note: "TOC-listed next scene is 'Pacific Towers' at p.13 (Euphoria-kidnap operational site); the hideout move is addressed separately from this scene. Use p.13 title-at-page to confirm exact scene id."
        page_hint: [11, 13]
      legwork_on_whitecastle_page: 56
      fallback_on_refusal: |
        If the PCs refuse the deal or never assemble at the pier,
        p.10 routes the scene straight to Deja Vu (p.27).
    tell_straight_summary: |
      The pier is empty by nine o'clock. Dockside warehouses bracket
      the approach road; water laps the piles. At eleven, a staggered
      arrival: a long sedan rolls in with a lanky, bereted bodyguard
      at the wheel; a chromed Scorpion motorcycle crests the road
      with an Ork rider; and finally Mr. Johnson steps out of the
      sedan. He is deliberately forgettable - smooth complexion,
      'implant-perfect' eyes, and a practiced smile - and opens with
      'shall we talk business?' Euphoria's name comes up quickly
      (MegaMedia starlet, Friday Sirius Foods promo appearance for
      Amber Gel), followed by the run: snatch her, hold her four
      days, return her unharmed. Fee and follow-up logistics follow.
    behind_scenes_summary: |
      Mr. Johnson's real name is explicitly withheld - an executive in
      Ludivenko's Seattle operations. Stats reference: SR1E Mr.
      Johnson Contact (p.170).

      Negotiation: opening offer is 20,000 nuyen per PC with a
      canonical +/-1,000 delta via an Opposed Negotiation Test. The
      half-on-abduction / half-on-missed-appearance payment plan is
      NOT negotiable. Johnson is uninterested in operational detail
      and dismissive of questions he considers obvious; he insists
      only on the four-day hold window and the no-harm directive
      (an injured or dead endorser undermines Ludivenko's
      corporate-sabotage angle).

      The driver / bodyguard is Juan Diablo - gang-punk-turned-
      samurai on Ludivenko funding. Stats reference: Company Man
      (p.164) + Troll Street Samurai (p.46), Gunnery 4. Equipment:
      Lined Coat; Browning Max-Power with silencer and explosive
      ammo; Uzi III with smartgun and shock pads. Passive unless the
      PCs turn violent.

      Diablo hands the PCs a magnetic-strip keycard addressed to
      Royal Meadows Apartments (the pre-arranged hideout), plus a
      whispernumber (#5-5-Chrome) for follow-up coordination. The
      keycard is a concrete scene object - a pickup the PCs carry
      forward.
    debugging_summary: |
      Missed or refused meet: Johnson comes to the pier anyway, but
      only characters actually present can participate in the brief.
      If the PCs turn violent, Diablo covers Johnson's extraction.
      Irreconcilable refusal routes to Deja Vu (p.27) and skips the
      first kidnap arc entirely.
    adaptation_notes:
      - "Scene-state handoffs: (1) keycard pickup (inventory item for Royal Meadows Apartments), (2) whispernumber addition to the PC's commlink contact list (Diablo, #5-5-Chrome), (3) terms log (four days / no harm / half-half payout) stored as quest state."
      - "Negotiation beat is mechanically thin (+/-1,000 nuyen max). Don't over-engineer dialogue options here - the canonical range is tight and Johnson's condescension means aggressive haggling is punished, not rewarded."
      - "Arrival cadence is explicitly staggered (Diablo first with the sedan, then the Ork chopper flourish, then Johnson). Keep the stagger in the cinematic - it sets tone without slowing pace."
      - "'Implant-perfect eyes' on Johnson is a small, specific detail. Preserve it in the character portrait brief."
    transcription_gaps:
      - "Specific identity of the Ork Scorpion rider is not disclosed on pp.9-10 (may be Diablo-adjacent muscle or unrelated dockside ambient; default to ambient until a later page clarifies)."
      - "District of Royal Meadows Apartments is not named on p.10 - only the building address on the keycard."
      - "The Ork Scorpion arrival is described on p.9 but Diablo's explicit make/model arrival is the Toyota Elite; whether the Scorpion belongs to Johnson's party or is incidental is left ambiguous."

