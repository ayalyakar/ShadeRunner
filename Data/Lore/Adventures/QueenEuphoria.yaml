  - "Source-file naming note: Sources/SR1E-QueenEuphoria/ filenames use pNNN in screenshot-upload order, NOT strictly matching printed page numbers. The 7 phone screenshots ingested so far (p001 - p007) cover printed pp.1 - 6 - the Ant Lion prologue spans printed pp.3 - 4 but was captured by 3 screenshots (p003, p004, p005) due to phone-scroll page overlap. The 'page:' field inside sources[] entries is the authoritative printed page number for cross-referencing."
  - "p.6 Plot Synopsis was ingested from a low-res phone screenshot; several names are tentative and must be re-verified when their chapter pages ingest: 'Elliot Whitecastle' (Fixer name spelling), 'Pride' + 'African-Itzaman' (magical-tradition name), 'Van Willis' (waiter name), 'Magic Crafts' (shop/location name in Puyallup Barrens), 'Blue Bacaoey' (Ludomeria's knockoff food product). 'Ludomeria' is ambiguous between corp and individual - classified as both a tentative faction and an NPC until disambiguated."
  - "p.8 Wake Up Call resolved two p.6 low-res misreads: 'Elliot Whitecastle' -> 'Ellery Whitecastle' (given name), and 'Ludomeria' -> 'Ludivenko Corporation' (employer name; also confirmed as a corporation rather than an individual). The superseded p.6 entries are preserved under status: superseded_by_p8 with supersedes_with pointers to the canonical detail files, so the reconciliation trail is self-documenting. Further Plot-Synopsis names from p.6 (Pride, Van Willis, Magic Crafts, Blue Bacaoey, African-Itzaman) remain pending re-verification."

