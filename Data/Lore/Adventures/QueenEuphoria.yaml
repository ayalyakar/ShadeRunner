transcription_gaps:
  - "Cover art is illustration-only: no text beyond the title 'Queen Euphoria' is captured on p.1."
  - "p.2 production credits (writing / development / editorial / production staff / art / illustration / layout) are intentionally NOT ingested to canon per project policy (real-world staff attribution is not in-world canon). Archive-only at Sources/SR1E-QueenEuphoria/p002-credits.png."
