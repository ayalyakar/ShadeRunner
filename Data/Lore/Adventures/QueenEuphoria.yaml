name: "Queen Euphoria"
kind: adventure_module
authored: false

# Era policy (project canon decision):
# Period piece locked to SR1E canonical year ~2050. NPCs, factions, and places
# extracted from this module are likewise tagged era: 2050 so later-era (up to
# 2064) runs can treat them as historical unless explicitly re-canonized.
era:
  canonical_year: 2050
  policy: period_piece_locked
  notes: |
    Ingestion policy for this module: adventure frame lives here; NPC / faction
    / place detail is extracted into Data/Lore/NPCs, Factions, and Places
    (split-file policy). Prologue fiction (Ant Lion) is intentionally NOT
    transcribed into structured canon - archive-only at Sources/.

publication:
  edition: SR1E
  publisher: FASA Corporation
  copyright_year: 1990
  # Production staff transcribed on p.2 (pending ingestion).

# Short framing. Ingested from printed p.6 (Plot Synopsis).
synopsis_stub: |
  An SR1E Seattle-era adventure module centered on the MegaMedia starlet
  known as "Euphoria". The cover art features a stylized dragonfly
  motif (foreshadowing the Ant Lion / insect-spirit themes of the prologue
  and plot). The module's spine is a corporate-sabotage caper that uncovers
  an Insect Spirit infestation (a Queen Ant Spirit hive seeded by a former
  explorer calling himself "Craft" under the hive's influence).

# Setting paragraph from printed p.5 INTRODUCTION, cross-checked against
# existing ShadeRunner canon (Data/Lore/Metroplex/Seattle.yaml and
# Districts/). Re-ingestion policy: capture the adventure's setting
# statements and flag any discrepancies for reconciliation.
setting_recap_from_p5:
  year: 2050
  world_premises:
    - "Advances in technology and magic have reshaped the world."
    - "The return of Magic: Elves, Dragons, Dwarfs, Orks, and Trolls now exist in their true forms."
    - "Megacorporations (rather than superpowers) rule much of the world."
    - "Shadowrunners operate in the gaps; no one admits their existence, no one denies it."
  setting_focus: "Streets and shadows of Seattle, Tacoma, and Redmond Districts of the Seattle metroplex."
  metroplex_extent:
    area_sq_miles: 1000
    area_note: "~1000 square miles; an urban sprawl on the eastern shore of Puget Sound."
  surrounding_powers:
    - "Larger states of Native American nations surrounding the metroplex (Treaty of Denver canon, already captured in Seattle.yaml history block)."
    - "Other sovereign states of Metahumans and Awakened Beings."
  cross_check_vs_existing_canon:
    - note: "Adventure p.5 names 'Seattle, Tacoma, and Redmond Districts' as the three foreground districts."
      reconciliation: "Not in conflict with Seattle.yaml - those are three of the metroplex's named districts. Adventure uses a narrow focus; full metroplex is broader. 'Seattle District' here likely means Downtown + Seattle-proper, which in later canon is broken into Downtown + other named districts. Treat as adventure-era loose usage, not a canon contradiction."
    - note: "Adventure p.5 gives metroplex area as ~1000 sq miles."
      reconciliation: "Consistent with Seattle.yaml metroplex scale. Downtown district alone is 468 km^2 (~180 sq mi) per p.19 of the Seattle Sourcebook, so 1000 sq mi for the full metroplex aligns."
    - note: "Adventure p.5 invokes Native American nations as surrounding powers."
      reconciliation: "Matches Seattle.yaml history (Treaty of Denver, NAN sovereignty). No conflict."
    - note: "Adventure p.5 year is 2050, matching the project's MVP-era lock."
      reconciliation: "No conflict; reinforces era: 2050 tag on this module."

# GM-facing module conventions defined on printed p.5. These apply to every
# scene-level ingestion in this module (and any future FASA 1E adventure
# modules we ingest). Captured once here to avoid re-explaining in every
# scene file. Also informs how scenes will be adapted to the CRPG's
# dialogue / narration layer.
presentation_conventions:
  making_success_tests:
    notation: "Skill (N)"
    meaning: "An unresolved Success Test using that skill against Target Number N."
    example: "'Stealth (4) Test' = unresolved Stealth Success Test at Target Number 4."
    success_tables:
      note: "Some rolls use a Success Table yielding different outcomes at different levels of success."
  scene_sections:
    - name: "Tell It To Them Straight"
      audience: players
      purpose: "Boxed read-aloud narration delivered verbatim (or close to it) at the player characters. Describes where they are and what they perceive as though they are present."
      adaptation_target: "In-game narration / scene-intro voiceover / environment description."
    - name: "Gamemaster's Notes"
      audience: gamemaster
      purpose: "Inline instructions to the GM, typeset in boldface. Provides run-of-play direction (what to spawn, what to say, what to check)."
      adaptation_target: "In-game scripting / flag-setting / conditional triggers (not surfaced to the player)."
    - name: "Behind the Scenes"
      audience: gamemaster
      purpose: "The real plot of the encounter: what is actually happening, what NPCs are doing off-screen. Maps and NPC statistics appear here if the encounter needs them."
      adaptation_target: "World-state authoritative truth, NPC AI behavior, scene-level data files."
    - name: "Debugging"
      audience: gamemaster
      purpose: "GM hints for recovering when a scene goes off-rails - e.g., keeping PCs from getting too discouraged or wiped too easily. GM is free to ignore."
      adaptation_target: "Fallback / failsafe branching in scene scripting; adaptive difficulty hooks."
    - name: "Legwork"
      audience: players (indirectly, via PC action)
      purpose: "Information the PCs can obtain via their contacts or via the public data nets (Matrix LTG / BBS queries)."
      adaptation_target: "Contact-dialogue unlocks, Matrix LTG search entries, dossier / codex content."

# ShadeRunner is a solo-PC CRPG (see Design/Meta/DESIGN - MVP.md).
# Queen Euphoria was written for a tabletop party. Any eventual adaptation
# of this module into playable content must reconcile the divergence
# logged here.
adaptation_notes:
  canonical_party_assumption:
    size_min: 4
    size_max: 8
    required_archetypes: ["magician", "decker"]
    combat_importance: "All characters need combat competence - canonical guidance is explicit."
    pregens_source: "SR1E basic rules + FASA's Sprawl Sites sourcebook."
  shaderunner_adaptation_divergence:
    party_size_mismatch: "ShadeRunner is strictly solo-PC. A 4-8 party is not supported."
    proposed_mitigations:
      - "Scale encounter difficulty down to a solo + optional hired-runner-NPC party."
      - "Bridge missing archetype coverage via hireable contacts (a hired decker / hired magician) when the PC lacks the skill."
      - "Some encounters may need to be cut or collapsed if the scene is mechanically dependent on multi-PC tactics."
    status: "Logged at ingestion time. Actual per-scene adaptation decisions land when (and if) the module is promoted into playable ShadeRunner runs."
  decision_tree_format:
    note: "The module uses a decision-tree structure: the same encounter may be reached via different paths, and some encounters can be missed entirely. This is a good structural match for ShadeRunner's branching-quest design."

# Plot synopsis ingested from printed p.6. Structured into ordered beats
# to aid later scene-level cross-referencing. Spoiler-flagged because the
# Insect Spirit / Queen Ant reveal is the central twist of the module
# (and a major SR canon event type); per ShadeRunner spoiler policy,
# in-game codex / dossier surfaces would gate on spoiler_level.
plot_synopsis:
  spoiler_level: gm_only
  spoiler_reveals:
    - "Thomas Dorin has an alias 'Craft' and is under the influence of an Insect Spirit (Queen Ant)."
    - "The 'Amber Gel' food product is derived from Insect Spirit Worker material."
    - "The Hive is located in the Puyallup Barrens."
    - "Vincent Burroughs of Sirius Foods is complicit but does not know the supernatural source."
  arc_summary: |
    A former explorer (Thomas Dorin / "Craft") returns from the South
    American jungle under the thrall of an unsummoned Queen Ant Spirit
    and begins building a Hive in the Puyallup Barrens. Financing the
    Hive, he sells Vincent Burroughs of Sirius Foods a mysteriously
    addictive food product, "Amber Gel," derived from Worker-spirit
    material. Rival corp Ludomeria hires a Fixer (Elliot Whitecastle)
    to sabotage Sirius's Euphoria-fronted Amber Gel promotion via a
    shadowrun kidnapping. Escalating corp retaliation draws the runners
    back in on a hired-to-find-Euphoria job for MegaMedia, after Craft
    himself kidnaps Euphoria (now obsessed with making her "His Queen").
    Investigation converges on Craft's Hive facility in Puyallup.
  plot_beats:
    - id: beat_01_discovery
      title: "Craft's discovery"
      summary: |
        Thomas Dorin, under the alias "Craft," has returned from the
        South American jungle bringing back an unsummoned Queen Ant
        Spirit. He begins forming a Hive in preparation for summoning
        her.
      pc_involvement: none
      spoiler_level: gm_only
    - id: beat_02_amber_gel
      title: "Amber Gel / Sirius Foods alliance"
      summary: |
        Craft discovers that Worker-Insect material blended with
        conventional food thickeners and additives yields a
        hypnotically addictive food product. He partners with Vincent
        Burroughs, a Sirius Foods executive: nuyen + corporate
        security in exchange for supply. Burroughs does not know the
        true source. Sirius executives are aware of the secret deal
        but look the other way so long as Burroughs keeps producing
        "Amber Gel."
      pc_involvement: none
      spoiler_level: gm_only
    - id: beat_03_euphoria_promotion
      title: "Euphoria hired to promote Amber Gel"
      summary: |
        Sirius Foods hires the media-celebrity Euphoria - normally a
        recluse - to promote Amber Gel in a Seattle-local rollout. If
        the appearances go well, Amber Gel gets pushed internationally.
        Currently the product is only mildly successful.
      pc_involvement: none
    - id: beat_04_ludomeria_hires_fixer
      title: "Ludomeria sabotage I: the Fixer"
      summary: |
        Rival corp Ludomeria learns of Euphoria's role and wants to
        disrupt Sirius's rollout. Ludomeria engages a local Fixer,
        Elliot Whitecastle, to assemble a shadowrunner team. Goal:
        prevent Euphoria appearing at any of her Amber Gel promotion
        events over one weekend. Expected fallout: Sirius tears up
        Euphoria's contract, and adverse publicity buries Amber Gel.
      pc_involvement: adversary_brief
    - id: beat_05_first_kidnap
      title: "First Euphoria kidnapping (the PCs' run)"
      summary: |
        The shadowrunners (the PCs) kidnap Euphoria and hide her
        across the scheduled appearance weekend. Sirius runs the
        promotions without their star, desperately trying to save
        face. MegaMedia - Euphoria's production company - is enraged.
      pc_involvement: primary
    - id: beat_06_pride_counter
      title: "Pride hired to find her"
      summary: |
        Sirius hires another shadowrunner, an African-Itzaman mage
        named Pride, to find Euphoria. Using ritual magic and a strand
        of Euphoria's hair from her pillowcase, Pride tracks the PCs.
        The PCs defeat Pride and hold Euphoria until Monday - past all
        her scheduled appearances - then release her.
      pc_involvement: primary
    - id: beat_07_court_standoff
      title: "Litigation between Sirius and MegaMedia"
      summary: |
        Sirius Foods and MegaMedia can't agree on compensation for the
        missed appearances (both know outside parties arranged it).
        They move to resolve the dispute in court.
      pc_involvement: none
    - id: beat_08_ludomeria_megamedia
      title: "Ludomeria sabotage II: MegaMedia deal"
      summary: |
        Ludomeria approaches MegaMedia with a similar contract - a
        series of Euphoria appearances promoting Ludomeria's own
        Amber-Gel-knockoff product, 'Blue Bacaoey'
        (transcription_note: product name reading tentative - low-res).
      pc_involvement: none
      transcription_note: "Product name 'Blue Bacaoey' read tentatively from low-res p.6; verify at a later ingestion pass."
    - id: beat_09_burroughs_panic
      title: "Burroughs orders Craft to act"
      summary: |
        Burroughs fears the combined negative publicity from the botched
        Sirius-Euphoria rollout AND Ludomeria's knockoff push will end
        his Sirius career. He asks Craft to 'take care of Euphoria.'
        Craft, under the hive's hold and fixated on Euphoria, takes
        this as his cue to make her 'His Queen.'
      pc_involvement: none
      spoiler_level: gm_only
    - id: beat_10_second_kidnap
      title: "Second kidnapping: Craft at Euphoria's penthouse"
      summary: |
        Using Soldier and Worker Insect Spirits from the Hive, Craft
        invades Euphoria's penthouse during a home studio recording
        session. He slaughters her bodyguards (brutally, in a way that
        reads as non-human) and kidnaps her. Her recording equipment
        captures the attack before she is taken. He brings her to the
        Hive, begins the Queen Ant summoning, and feeds her a
        concoction to begin her metamorphosis.
      pc_involvement: none
      spoiler_level: gm_only
      key_evidence:
        - "Recording captures two men: one wearing a 'Garnaty's Bar and Grill' t-shirt, another speaking the name 'Burroughs'."
    - id: beat_11_megamedia_hires_pcs
      title: "MegaMedia contracts PCs to find Euphoria"
      summary: |
        MegaMedia pressures Sirius (in court) to help recover Euphoria.
        Robert Carmon - previously a Fixer, now a MegaMedia VP - is
        put in charge of the recovery. Suspecting the PCs were
        involved in the first kidnapping and at least have information,
        Carmon hires them to find Euphoria this time.
      pc_involvement: primary
    - id: beat_12_penthouse_investigation
      title: "Penthouse crime scene"
      summary: |
        Carmon takes the runners to Euphoria's penthouse where the
        second kidnapping occurred. The scene is carnage - the
        bodyguards butchered in a way that suggests nothing Human did
        it. During investigation the runners find / suspect Euphoria's
        recording equipment; review it for the evidence it captured.
      pc_involvement: primary
      evidence_discovered:
        - "Garnaty's Bar and Grill logo visible on an attacker's clothing."
        - "Attacker's conversation includes the name 'Burroughs'."
    - id: beat_13_lead_garnatys
      title: "Lead: Garnaty's Bar and Grill"
      summary: |
        Runners follow the Garnaty's clue to the bar and ask after a
        missing waiter, Van Willis. Trail leads to a sighting in the
        Puyallup Barrens near a shop / location named 'Magic Crafts.'
      pc_involvement: primary
      transcription_note: "Shop / location name 'Magic Crafts' and waiter name 'Van Willis' read tentatively from low-res p.6; verify at later ingestion pass."
    - id: beat_14_lead_burroughs
      title: "Lead: Vincent Burroughs' office"
      summary: |
        Runners bluff / fight their way into Burroughs' office and learn
        part of Amber Gel's history. A Soldier (Man) Insect Spirit
        attacks Burroughs; if the runners protect him, they may also
        recover the original Amber Gel concoction from a hidden
        compartment in his office.
      pc_involvement: primary
    - id: beat_15_lead_matrix
      title: "Lead: Matrix run on Sirius Foods"
      summary: |
        Alternate path: penetrate Sirius Foods' computer system. Yields
        information on Amber Gel production and on Craft.
      pc_involvement: primary
      archetype_dependency: decker
    - id: beat_16_climax
      title: "Climax: the Amber Gel production facility / Hive"
      summary: |
        All three leads converge on the Amber Gel production facility
        hidden in the Puyallup Barrens. Deep within: Craft, and the
        nascent Ant Spirit Hive. The module closes on the explicit
        open question: 'What else will they find there? And will they
        live to tell about it?'
      pc_involvement: primary
      spoiler_level: gm_only

  # Page-6 also carries three short meta-paragraphs about the rest of the
  # book's chapter structure (Cast of Characters, Picking Up the Pieces,
  # Player Handouts). Summarized here; structural skeleton for these
  # already lives under structure.sections above.
  module_structure_notes_from_p6:
