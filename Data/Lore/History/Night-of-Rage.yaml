# Seattle history — Alameson governorship + Night of Rage (2036-2039).
# Split from Metroplex/Seattle.yaml history block.
#
# Covers: Victor 'Vic the Quick' Alameson elected 2036, Liberty Village
# firebombing, the 2039-02-07 Night of Rage (canonical SR event),
# Metroplex Guard complicity, Hands of Fire allegation.

era: "Night of Rage"
period: "2036 - 2039-02-07 aftermath"
scope_note: |
  Canonical SR-scale event. Seattle's specific experience (waterfront
  warehouse inferno) was the epicenter of a global wave of anti-
  metahuman violence. Direct origin of the Ork Underground's
  sewer-migration beat and the Puyallup-Barrens refugee community.

sources:
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 17
    image: "Sources/SR1E-Seattle/p017-history-night-of-rage.png"
    section: "History — Alameson governorship / Night of Rage"
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 18
    image: "Sources/SR1E-Seattle/p018-history-from-ashes-schults.png"
    section: "History — Night of Rage BBS follow-up thread"

alameson_governorship:
  source_page: 17
  overview: |
    Victor 'Vic the Quick' Alameson succeeded Kruse in 2036. Anti-
    metahuman from the campaign forward; his policies directly set
    up the Night of Rage in 2039.
  governor:
    name: "Victor Alameson"
    nickname: "Vic the Quick"
    prior_career: "Former Tacoma Timberwolves combat biker."
    prior_career_cross_ref: "See entertainment.sports.teams — Seattle Timberwolves."
    prior_career_transcription_note: |
      Page reads 'Tacoma Timberwolves' (matching Timberwolves' home
      venue, Tacoma Dome). Canon team name is 'Seattle Timberwolves';
      same franchise, colloquial reference.
    elected_year: 2036
  platform_and_signature_statement:
    campaign_stance: "Explicitly anti-metahuman."
    signature_quote: "Orks, Trolls, Elves, and Dwarves are 'offensive combat bikers, but I'm afraid they haven't the brains for much else.'"
    quote_transcription_note: "Quote paraphrased from a partly-illegible scan; exact wording approximate."
  early_policy:
    - "Crackdown on metahuman combat bikers."
    - "Emboldened racist groups to recruit and escalate violence under implicit state cover."
  liberty_village_atrocity:
    date_year: 2036
    location: "Liberty Village, Ohio"
    event: "20 people, most of them Metahumans, killed when a well-organized hooded gang firebombed a church."
    responsibility_claimed_by: "Alameson Branch of the Humanis Policlub."
    responsibility_transcription_note: |
      Branch name read as 'Alameson' — matches the new Governor's
      surname exactly. Likely intentional canon: the Governor's name
      attached to a Humanis sub-organization, signalling ideological
      alignment. Flag for verification.
    effect: "Catalyzed a wave of anti-metahuman attacks across North America."

night_of_rage:
  source_page: 17
  date: "2039-02-07"
  canonical_event: true
  canon_note: |
    The Night of Rage is a core SR1E-canon event worldwide. This page
    presents Seattle's specific experience — the firebombed waterfront
    warehouses — as the epicenter of the broader global wave.
  seattle_specific_sequence:
    ordered_by: "Seattle Metroplex Council, under order of Governor Alameson."
    round_up:
      - "All Metahumans systematically rounded up."
      - "Transported under armed guard to huge warehouses on the waterfront."
      - "Told this was the final processing center before 'resettlement' — part of Alameson's 'improved citizenship' plan."
    warehouse_inferno:
      - "Screams audible from inside one warehouse; then gunfire."
      - "Panic and hysteria swept the waterfront."
      - "Series of explosions; flames ripped through the old wooden structures."
      - "The Metroplex Guard 'simply stood by' and let the inferno blaze."
    escape:
      - "Many Metahumans escaped through the waterfront sewer system."
      - "Sewer escape is part of the canonical Ork-Underground origin narrative (see ork_underground.history_hooks)."
    death_toll: "Staggering — full count never confirmed."
  implicated_parties:
    official:
      - name: "Metroplex Guard"
        role: "Armed escort; then inaction as warehouses burned."
        file: "Data/Lore/Factions/Metroplex Guard.yaml"
    political:
      - name: "Governor Victor Alameson"
        role: "Ordered the round-up as final phase of 'improved citizenship' plan."
    extremist:
      - name: "Humanis Policlub (Alameson Branch)"
        role: "Previously responsible for Liberty Village atrocity; strongly implied in the warehouse fires."
        file: "Data/Lore/Factions/Humanis Policlub.yaml"
    magical:
      - name: "Hands of Fire"
        role: "Neo-magical group alleged by some witnesses to have been on the scene before the warehouses ignited."
        status: "Unconfirmed; canonical ambiguity."
        transcription_note: "Name read as 'Hands of Fire'; group description brief. No stub created yet."
  political_fallout:
    united_corporation_council:
      action: "Threatened Governor Alameson with massive boycotts if he didn't immediately end the terrorism."
      file: "Data/Lore/Factions/United Corporation Council.yaml"
    spd_successor_response: "War-trained SPD-successor forces (Metroplex Guard / Lone Star-era ancestor units) arrived too late; warehouses already burned."
    public_reaction: "Citywide outcry; citizens 'set up a cry of protest'."
  global_trigger_effect: |
    The violence on the Seattle docks triggered similar incidents
    throughout the city that night, and across the world in the
    days that followed. Canonical global 'Night of Rage' pattern.
  game_presence:
    mvp: |
      Historical / lore only — grounds every metahuman NPC's implied
      backstory (who survived, who fled, who lost family). Ambient
      dialogue + Trid anniversary content candidates.
    post_mvp:
      - "Anniversary-of-Rage flashback content on Feb 7."
      - "Survivor-NPC elder type (cross-ref Ork Underground migrants)."
      - "Run: retrieve / bury evidence of a specific warehouse-fire incident."
      - "Run: expose a Humanis alumnus who participated and still walks free."
      - "Tacoma-Timberwolves-era Alameson relic as MacGuffin."
  bbs_followup_thread:
    source_page: 18
    topic: "BBS flame war about Night of Rage responsibility — Humanis PR vs. Professor Stealth vs. reader replies."
    posts:
      - handle: "The Humanis Policlub Information Service"
        timestamp_raw: "(20-00-19-38) (35-50)"
        role: "Humanis Policlub's official PR arm; hostile response to Professor Stealth's Thunder Tyer bio and related anti-Humanis narrative."
        position:
          - "Claimed most Metahuman deaths were 'purely accidental' — Metahumans killed each other in the frantic escape."
          - "Attacked Professor Stealth's credibility on grounds he is 'himself a Metahuman brainwashed to believe all Humans are evil'."
          - "Included a recruitment / contact hook: 'TGY 22-10-12-14' as the Policlub Info Service LTG."
        transcription_note: "Contact LTG + signature phrasing read with low confidence."
        faction_ref: "Data/Lore/Factions/Humanis Policlub.yaml"
        game_presence: "PR-voice template for Humanis in-game BBS / Trid content."
      - handle: "Alameson"
        timestamp_raw: "(11-16-14-45) (9-50)"
        provenance_note: |
          The handle 'Alameson' appearing in BBS after Governor
          Alameson's 2039 murder is canonically ambiguous — either
          an impersonator / family member / Humanis staffer using
          the name symbolically, or a fabricated attribution. Treat
          as ambient hostile-voice content, not as Alameson himself.
        transcription_note: "Post body partly illegible; captured only as 'hostile anti-metahuman' register."
      - handle: "Anonymous"
        timestamp_raw: "(25-17-50) (5-25-5)"
        topic: "Raises an opposing claim: that Orks broke through the sewer system and actively prevented some Metahumans from escaping."
        transcription_note: "Claim and exact phrasing partly illegible; captured in spirit as a counter-narrative."

