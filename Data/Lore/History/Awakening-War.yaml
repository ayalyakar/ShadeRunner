# Seattle history — Awakening War era (2010-2018).
# Split from Metroplex/Seattle.yaml history block.
#
# Covers: 2010 land-seizure, 2011 VITAS + Olympic earthquake, 2011-2017
# guerrilla war, Great Ghost Dance (2017-08-04), Treaty of Denver (April
# 2018), NAN intelligence agency Truth Element, Thunder Tyer biography.

era: "Awakening War"
period: "2010 - April 2018"
scope_note: |
  Continental-scale SR1E canon presented in the Seattle Sourcebook as
  the framing for the metroplex's SSC-border and NAN-sovereignty
  context. Key canonical actors: Howling Coyote (spiritual leader),
  Thunder Tyer (Salish field commander), President William James
  (US Treaty signatory).

sources:
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 14
    image: "Sources/SR1E-Seattle/p014-history-treaty-of-denver.png"
    section: "History — Treaty of Denver (opening)"
  - edition: SR1E
    book: "Seattle Sourcebook"
    year: 1990
    page: 15
    image: "Sources/SR1E-Seattle/p015-history-treaty-provisions-exodus.png"
    section: "History — Treaty provisions / Truth Element / Thunder Tyer bio"

awakening_war:
  source_page: 14
  period: "2010 – April 2018"
  scope: "Continental — not Seattle-specific. Seattle Sourcebook uses the war as the framing for why the SSC now borders the city."
  trigger_2010:
    us_action: "U.S. National Congress enacted a land-seizure law using a fabricated-pretext militia group as justification."
    pretext_name: "Lost Eagle Militia"
    pretext_transcription_note: |
      Name read as 'Lost Eagle Militia'; possibly 'Last Eagle' or a
      different organization. Exact name + legal vehicle partly
      illegible; revisit on re-scan.
    outcome: "Stripped Native Americans of what little land they still held."
  vitas_backdrop_2011:
    global_population_affected_fraction: 0.25
    pacific_northwest_population_affected_fraction_approx: 0.143
    notes: "VITAS plague co-occurred with the land seizures, destabilizing both government response and refugee movement."
  olympic_earthquake:
    date: "2011-01-12"
    location: "Olympic Peninsula"
    effect: |
      Powerful quake damaged federal relocation-camp infrastructure;
      thousands of interned Native Americans escaped and fled to
      other camps or into the wilderness.
  guerrilla_war:
    period: "2011 – 2017"
    leadership:
      - name: "Howling Coyote"
        role: "Spiritual leader of the Native American resistance; later led the Great Ghost Dance."
      - name: "Thunder Tyer"
        role: "Salish warrior chief, close friend of Howling Coyote; field commander of the guerrilla campaign."
        transcription_note: "Name read as 'Thunder Tyer'; SR canon sometimes renders 'Thunder Tyler'. Flag for cross-reference."
    war_council:
      name: "Salish-Shidhe War Council"
      composition:
        - "Native American tribes"
        - "Elves"
        - "Magicians"
      member_tribes_listed_on_page:
        - "Salish"
        - "Makah"
        - "Norteño"
        - "Cree"
        - "Salish-Shakal"
      member_tribes_transcription_note: |
        Tribe list partly illegible; 'Salish-Shakal' low confidence
        (possibly 'Salish-Shidhe' or a distinct tribe). Tribes read
        best-effort; revisit on re-scan.
    atrocities_note: "Both sides committed documented atrocities through the six-year war."
    salish_offensive_2015:
      - event: "Trident Submarine Base (Bangor) captured"
        year: 2015
        captor: "Salish forces under Thunder Tyer"
      - event: "Kugri Sound Naval Shipyard (Bremerton) captured"
        year: 2015
        timing: "Five months after Trident Base."
        captor: "Salish forces"
        transcription_note: "Shipyard read as 'Kugri Sound'; canonical name may be 'Puget Sound Naval Shipyard'. Flag and revisit."
    penultimate_siege:
      - "Salish forces mustered for a final showdown against McChord Air Force Base and Fort Lewis."
  great_ghost_dance:
    date: "2017-08-04"
    leader: "Howling Coyote (leading Native American followers in the ritual)"
    simultaneous_volcanic_eruptions:
      - "Mount Hood"
      - "Mount St. Helens"
      - "Mount Rainier"
      - "Glacier Peak"
    effects:
      - "Pacific Northwest blanketed in ash, smoke, and lava."
      - "Day turned to near-dark night."
      - "Social structure of the region near collapse."
    historiography: |
      Even skeptics of the supernatural could not ignore that the
      eruptions coincided exactly with the ritual — canonical moment
      when mana's scale became undeniable globally.
    transcription_note: |
      Exact seismic-magnitude text ('X5-32'?) on the page partly
      illegible. Four-mountain list is high-confidence.
  treaty_of_denver:
    signed: "2018-04 (April 2018)"
    signatory_states:
      - "United States (President William James)"
      - "Canada"
      - "Mexico"
    native_signatories: "Native American Nations (NAN) collective, including the Salish-Shidhe War Council."
    driver: "Cessation of hostilities + recognition of native sovereignty."
    provisions:
      source_page: 15
      formal_sovereignty: "Formal recognition of NAN as a sovereign federation of Native American nations."
      territory_ceded_to_nan: "Most of western North America."
      us_retained_enclaves:
        - "California"
        - "Seattle"
        - "Everett"
        - "Tacoma"
        - "Denver"
      us_enclave_notes: |
        The four Pacific-Northwest cities (Seattle / Everett / Tacoma
        / Denver) became US-sovereign city-states surrounded by (or
        adjacent to) NAN territory. This is the structural basis of
        the Seattle Metroplex — a UCAS enclave in the middle of SSC
        lands. Canonical driver for border-crossing logistics
        captured under salish_shidhe_council_access.

post_awakening_intelligence:
  source_page: 15
  overview: |
    Most world intelligence agencies struggled to accept magic as
    real after the Awakening, even in the face of repeated elaborate
    demonstrations. NAN moved first on magic-integrated
    counterintelligence.
  nan_intel_agency:
    name: "Truth Element"
    role: "NAN counterintelligence / magical-powered interrogation and agent-hunting."
    early_operations:
      - "Rounded up foreign intelligence assets embedded in NAN territory shortly after the Treaty of Denver."
      - "Elite Native-American-tribe members identified as having been turned by foreign powers were executed; 'truth' was established magically."
    notes: |
      The Truth Element is the canonical SR1E NAN spy-hunter agency.
      Useful as an antagonist faction for runners operating in
      SSC / NAN lands, or as a run-adjacent threat when NAN citizens
      appear on run objectives.
    transcription_note: "Agency name and early-operations phrasing read with low confidence; key facts captured."
  us_magic_integration:
    lag_years: 5
    milestone: "Five years after the Awakening, agencies including the CIA and FBI were able to successfully integrate magicians into their operations."
    implication: "Magic-assisted intelligence is relatively recent in US institutions — a canonical reason for US-side paranoia / obsession re: NAN thaumaturgical parity."
  bbs_post_smiley:
    handle: "Smiley"
    timestamp_raw: "(18-39-94-3) (?-2-50)"
    timestamp_transcription_note: "Handle + timestamp read with low confidence."
    topic: "Military-reluctance-to-accept-magic observation; cynical-veteran register."
  bbs_post_colonel_mendiola:
    handle: "Colonel Mendiola"
    timestamp_raw: "(21-02-04-5) (5-50)"
    handle_transcription_note: "Handle read as 'Colonel Mendiola' / 'Menlosla'; low confidence."
    topic: |
      First-person recollection of NAN warriors using magic during
      the Ninth Division's operations in the Awakening. Notes that
      NAN magic users husbanded power for the Great Ghost Dance
      rather than deploying it in every engagement.
    game_presence: |
      Useful as a voice profile for older military / veteran NPCs
      reminiscing about the war. Retained as a persona hook, not yet
      promoted.

thunder_tyer_biography:
  source_page: 15
  format: "BBS exchange — 'Canyon' asks what happened; 'Professor Stealth' replies with a detailed biography."
  asker:
    handle: "Canyon"
    timestamp_raw: "(20-00-48-4) (34-30)"
    transcription_note: "Handle + timestamp read with low confidence."
  responder:
    handle: "Professor Stealth"
    timestamp_raw: "(15-45-20-5) (2-50)"
    transcription_note: "Handle + timestamp read with low confidence."
    voice_profile_note: |
      Authoritative, documentary tone; willing to assemble long
      multi-sentence historical summaries. Candidate for a recurring
      persona (promotion deferred pending additional appearances).
  biography:
    early_life:
      stepmother_community: "Native American — Salish or adjacent tribe."
      us_army:
        enlisted_age: 18
        notes: "Joined the US Army at age 18; rose to officer rank in the infantry."
      enlisted_age_transcription_note: "Age read as 18 (possibly 28 or 38); prose partly illegible."
      rumored_double_agent: |
        Rumored to have worked as a NAN / Red sympathizer while still
        in US uniform. Never conclusively documented.
    defection_to_nan:
      trigger: "Radicalized by mistreatment of his stepmother's community and other Native Americans in Colorado."
      transcription_note: "Location / Colorado-specific detail partly illegible."
    salish_shidhe_command:
      role: "Assumed control of Salish-Shidhe War Council military operations."
      credited_victories: "Trident Submarine Base (Bangor), Kugri / Puget Sound Naval Shipyard (Bremerton), and other major offensives."
      atrocities:
        note: "Multiple reports link Thunder Tyer to atrocities committed by Salish forces against Anglo civilians."
        moral_complexity: |
          Same commander credited with ordering Salish warriors to
          evacuate and protect Anglo civilians threatened by the
          Mount Rainier eruption late in the war — canonical moral
          contradiction.
    fate_after_treaty:
      certainty: "Unknown."
      rumors:
        - "Retired quietly to a peninsula homestead with his wife and children immediately after Treaty ratification."
        - "Assassinated by a US Army wetwork team."
        - "Executed by his own officers after ordering Salish warriors to lay down arms and evacuate Anglos from volcanic-threat zones."
      transcription_note: "Three-rumor enumeration captured with moderate confidence."
  game_presence:
    mvp: "historical / lore only (pre-game, likely deceased or mythological by 2050)."
    post_mvp:
      - "Source material for shaman / elder NPC dialogue about the war era."
      - "Possible living-old-man NPC if canon supports (age ~70-90 by 2050)."
      - "Thunder-Tyer-era relic as a run MacGuffin."
      - "Atrocity / moral-contradiction angle for faction-rep politics in SSC-border runs."

